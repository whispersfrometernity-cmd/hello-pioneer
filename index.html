<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pioneer Species</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 2.5rem; margin-bottom: 2rem; }
    h2 { font-size: 1.25rem; margin: 2rem 0 0.5rem; }
    input, textarea {
      display: block; width: 100%; padding: 0.5rem;
      border: 1px solid #ccc; border-radius: 4px;
      font-size: 1rem; margin-bottom: 0.5rem;
    }
    textarea { height: 100px; resize: vertical; }
    button {
      padding: 0.5rem 1.5rem; font-size: 1rem;
      background: #000; color: #fff;
      border: none; border-radius: 4px; cursor: pointer;
    }
    button:hover { background: #333; }
    #status { margin: 0.5rem 0; font-size: 0.9rem; color: #555; min-height: 1.2em; }
    .note { border-bottom: 1px solid #eee; padding: 1rem 0; }
    .note h3 { margin: 0 0 0.25rem; font-size: 1rem; }
    .note p { margin: 0 0 0.25rem; color: #333; }
    .note time { font-size: 0.8rem; color: #999; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>hello from Pioneer Species</h1>

  <h2>Post a note</h2>
  <input  id="title"   type="text" placeholder="Title" />
  <textarea id="content" placeholder="What's on your mind?"></textarea>
  <button id="submit">Post note</button>
  <p id="status"></p>

  <h2>Latest notes</h2>
  <div id="notes"><p>Loading…</p></div>

  <script type="module" src="/main.js"></script>
</body>
</html>
